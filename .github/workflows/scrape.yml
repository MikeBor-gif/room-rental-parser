name: scrape

# Цикл парсинга и рассылки: парсеры -> новые объявления -> матчинг по фильтрам
# юзеров -> доставка. Основной триггер — cron-job.org (workflow_dispatch каждые
# 2–3 минуты), schedule — резервный. Состояние живёт в Supabase, коммитов
# обратно в репозиторий больше нет.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

# Отменяем зависший предыдущий прогон вместо очереди — иначе очередь копится
# быстрее, чем раннеры её разгребают, и GitHub роняет джобы.
concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrape cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          LOG_LEVEL: INFO
          # Необязательные настройки тарифов (Settings -> Variables):
          TARIFF_PRICE_BYN: ${{ vars.TARIFF_PRICE_BYN }}
          FREE_BATCH_MINUTES: ${{ vars.FREE_BATCH_MINUTES }}
          PREMIUM_MAX_FILTERS: ${{ vars.PREMIUM_MAX_FILTERS }}
        run: python -m src.jobs.scrape
