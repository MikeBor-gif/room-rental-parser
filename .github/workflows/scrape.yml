name: scrape

# Запуск по расписанию + вручную из вкладки Actions.
on:
  schedule:
    # Каждые 15 минут (UTC). GitHub может запускать с задержкой ~5-15 мин — это нормально.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# Нужны права на запись, чтобы коммитить обновлённый data/seen.db обратно в репозиторий.
permissions:
  contents: write

# Не запускать новый прогон, пока не завершился предыдущий.
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: INFO
          # Необязательные фильтры (можно задать в Settings -> Variables, иначе пусто):
          MAX_PRICE: ${{ vars.MAX_PRICE }}
          KEYWORDS: ${{ vars.KEYWORDS }}
        run: python -m src.main

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain data/seen.db)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/seen.db
            git commit -m "chore: update seen listings state [skip ci]"
            git push
          else
            echo "Состояние не изменилось — коммит не нужен."
          fi
